<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect — preserves the last path segment as ?template=
      var l = window.location;
      var segments = l.pathname.replace(/\/$/, '').split('/');
      var slug = segments[segments.length - 1];
      var base = segments.slice(0, -1).join('/') + '/';
      var search = (slug ? 'template=' + encodeURIComponent(slug) : '') +
                   (l.search ? (slug ? '&' : '?') + l.search.slice(1) : '');
      l.replace(l.protocol + '//' + l.host + base + (search ? '?' + search : '') + l.hash);
    </script>
  </head>
  <body></body>
</html>
